<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal E-Presensi PVN 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container-card {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      text-align: center;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-placeholder {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .title-main {
      font-weight: 700;
      color: #333;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .role-btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 15px;
      font-weight: 600;
      font-size: 1.1rem;
      text-decoration: none;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-peserta {
      background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
      color: white;
      border: none;
    }
    
    .btn-peserta:hover {
      background: linear-gradient(to right, #00f2fe 0%, #4facfe 100%);
      color: white;
      transform: scale(1.02);
      box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
    }

    .btn-instruktur {
      background: linear-gradient(to right, #ff0844 0%, #ffb199 100%);
      color: white;
      border: none;
    }

    .btn-instruktur:hover {
      background: linear-gradient(to right, #ffb199 0%, #ff0844 100%);
      color: white;
      transform: scale(1.02);
      box-shadow: 0 5px 15px rgba(255, 8, 68, 0.4);
    }
  </style>
</head>
<body>

  <div class="container-card">
    <div class="logo-placeholder">🏢</div>
    <h2 class="title-main">Portal E-Presensi</h2>
    <p class="subtitle">Satpel PVP Mamuju</p>
    <p class="subtitle">Pelatihan Vokasi Nasional Batch 2 Tahun 2026</p>

    <!-- Tombol Mengarah ke file html masing-masing -->
    <a href="peserta.html" class="role-btn btn-peserta">🎓 Presensi Peserta</a>
    <a href="instruktur.html" class="role-btn btn-instruktur">👨‍🏫 Presensi Instruktur</a>
    <a href="https://www.bloomberg.com/news/articles/2024-02-02/indonesia-s-jokowi-denies-cabinet-rifts-ahead-of-election" class="role-btn btn-instruktur">-</a>
    
  </div>

</body>
</html>
